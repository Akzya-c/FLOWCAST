<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLOWCAST - Weather Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

/* HEADER */

.header{
background:white;
border-radius:20px;
padding:30px;
margin-bottom:30px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.header h1{
font-size:2.5em;
background:linear-gradient(135deg,#1e3c72,#2a5298);
background-clip:text;
-webkit-background-clip:text;
color:transparent;
margin-bottom:10px;
}

.header p{
color:#666;
}

.search-section{
display:flex;
gap:10px;
margin-top:20px;
justify-content:center;
}

.search-input{
padding:12px;
width:250px;
border-radius:30px;
border:2px solid #ddd;
outline:none;
}

.search-btn{
padding:12px 25px;
background:#2a5298;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

.search-btn:hover{
background:#1e3c72;
}

/* ERROR */

.error-message{
display:none;
background:#ff4444;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
}

/* LOADING */

.loading{
display:none;
text-align:center;
padding:30px;
color:white;
}

.loading-spinner{
width:50px;
height:50px;
border:5px solid rgba(255,255,255,0.3);
border-top-color:white;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* WEATHER CARD */

.current-weather{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.location{
font-size:2em;
margin-bottom:10px;
}

.temperature{
font-size:3em;
font-weight:bold;
color:#1e3c72;
}

.details-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.detail-card{
background:#f5f7fa;
padding:15px;
border-radius:10px;
text-align:center;
}

.detail-label{
color:#666;
}

.detail-value{
font-size:1.5em;
font-weight:bold;
}

/* RISK SECTION */

.risk-section{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.risk-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.risk-level{
padding:5px 10px;
border-radius:10px;
font-weight:bold;
}

.risk-low{background:#00C851;color:white}
.risk-moderate{background:#ffbb33}
.risk-high{background:#ff8800;color:white}
.risk-extreme{background:#ff4444;color:white}

.risk-progress{
height:10px;
background:#eee;
border-radius:10px;
margin:10px 0;
}

.risk-progress-bar{
height:100%;
background:linear-gradient(90deg,#4A90E2,#FF9F1C);
width:0%;
}

/* FORECAST */

.forecast-section{
background:white;
padding:20px;
margin-top:25px;
border-radius:20px;
}

.forecast-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.forecast-card{
background:#f5f7fa;
padding:10px;
border-radius:10px;
text-align:center;
}

.api-status{
text-align:center;
margin-top:20px;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🌊 FLOWCAST</h1>
<p>Flood & Heatwave Risk Dashboard</p>

<div class="search-section">
<input id="cityInput" class="search-input" placeholder="Enter city name" value="Mumbai">
<button class="search-btn" onclick="getWeather()">Get Weather</button>
</div>
</div>

<div id="errorMessage" class="error-message"></div>

<div id="loading" class="loading">
<div class="loading-spinner"></div>
<p>Loading weather data...</p>
</div>

<div id="mainContent" style="display:none">

<div class="current-weather">

<div class="location" id="cityName">--</div>

<div class="temperature" id="temperature">--</div>

<div class="details-grid">

<div class="detail-card">
<div class="detail-label">Humidity</div>
<div class="detail-value" id="humidity">--</div>
</div>

<div class="detail-card">
<div class="detail-label">Pressure</div>
<div class="detail-value" id="pressure">--</div>
</div>

<div class="detail-card">
<div class="detail-label">Wind Speed</div>
<div class="detail-value" id="wind">--</div>
</div>

<div class="detail-card">
<div class="detail-label">Feels Like</div>
<div class="detail-value" id="feels">--</div>
</div>

</div>
</div>

<div class="risk-section">

<div class="risk-card">
<h3>🌊 Flood Risk <span id="floodRisk" class="risk-level">--</span></h3>

<div class="risk-progress">
<div id="floodBar" class="risk-progress-bar"></div>
</div>

<p>Total Rainfall: <span id="rainTotal">--</span></p>

</div>

<div class="risk-card">

<h3>🔥 Heat Risk <span id="heatRisk" class="risk-level">--</span></h3>

<div class="risk-progress">
<div id="heatBar" class="risk-progress-bar"></div>
</div>

<p>Max Temp: <span id="maxTemp">--</span></p>

</div>

</div>

<div class="forecast-section">

<h3>Next 24 Hours Forecast</h3>

<div id="forecastGrid" class="forecast-grid"></div>

</div>

</div>

<div id="apiStatus" class="api-status">Add your OpenWeather API Key</div>

</div>

<script>

const API_KEY = "YOUR_API_KEY_HERE";

function showError(msg){
const e=document.getElementById("errorMessage");
e.style.display="block";
e.innerText=msg;
}

function hideError(){
document.getElementById("errorMessage").style.display="none";
}

async function getWeather(){

const city=document.getElementById("cityInput").value;

if(!city){
showError("Enter city name");
return;
}

hideError();
document.getElementById("loading").style.display="block";

try{

const currentRes=await fetch(https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric);

if(!currentRes.ok){
showError("City not found");
return;
}

const current=await currentRes.json();

const forecastRes=await fetch(https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric);

let forecast={};
if(forecastRes.ok){
forecast=await forecastRes.json();
}

updateWeather(current);
updateForecast(forecast);
calculateRisk(current,forecast);

document.getElementById("mainContent").style.display="block";

}catch(err){
showError("API Error or Network problem");
}

document.getElementById("loading").style.display="none";

}

function updateWeather(data){

document.getElementById("cityName").innerText=data.name+", "+data.sys.country;
document.getElementById("temperature").innerText=Math.round(data.main.temp)+"°C";
document.getElementById("humidity").innerText=data.main.humidity+"%";
document.getElementById("pressure").innerText=data.main.pressure+" hPa";
document.getElementById("wind").innerText=data.wind.speed+" m/s";
document.getElementById("feels").innerText=Math.round(data.main.feels_like)+"°C";

}

function updateForecast(data){

if(!data.list) return;

const grid=document.getElementById("forecastGrid");
grid.innerHTML="";

for(let i=0;i<8;i++){

const item=data.list[i];
const hour=new Date(item.dt*1000).getHours();

grid.innerHTML+=`
<div class="forecast-card">
<div>${hour}:00</div>
<div>${Math.round(item.main.temp)}°C</div>
</div>
`;

}

}

function calculateRisk(current,forecast){

let rain=0;

if(forecast.list){
forecast.list.slice(0,8).forEach(i=>{
rain+=i.rain?.["3h"]||0;
});
}

let flood="LOW",prob=10;

if(rain>100){flood="EXTREME";prob=90}
else if(rain>50){flood="HIGH";prob=70}
else if(rain>25){flood="MODERATE";prob=40}

document.getElementById("floodRisk").innerText=flood;
document.getElementById("floodRisk").className="risk-level risk-"+flood.toLowerCase();
document.getElementById("floodBar").style.width=prob+"%";
document.getElementById("rainTotal").innerText=rain.toFixed(1)+" mm";

let maxTemp=current.main.temp;

if(forecast.list){
forecast.list.slice(0,8).forEach(i=>{
maxTemp=Math.max(maxTemp,i.main.temp);
});
}

let heat="LOW",hprob=10;

if(maxTemp>40){heat="EXTREME";hprob=90}
else if(maxTemp>37){heat="HIGH";hprob=70}
else if(maxTemp>33){heat="MODERATE";hprob=40}

document.getElementById("heatRisk").innerText=heat;
document.getElementById("heatRisk").className="risk-level risk-"+heat.toLowerCase();
document.getElementById("heatBar").style.width=hprob+"%";
document.getElementById("maxTemp").innerText=Math.round(maxTemp)+"°C";

}

window.onload=getWeather;

</script>
